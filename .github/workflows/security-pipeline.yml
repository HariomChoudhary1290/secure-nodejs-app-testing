name: Secure CI/CD Pipeline

permissions:
  contents: read

on:
  push:
    branches:
      - main

jobs:
  security-scan-build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Install Dependencies
      - name: Install Dependencies
        run: npm install

      # Gitleaks
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

      # Semgrep
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1

      # Checkov
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .

      # NPM Audit
      - name: Run NPM Audit
        run: npm audit --audit-level=high

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t secure-nodejs-app:${{ github.run_number }} .

      # Trivy Scan
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: secure-nodejs-app:${{ github.run_number }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      # Save Docker Image as TAR
      - name: Save Docker Image
        run: |
          docker save secure-nodejs-app:${{ github.run_number }} -o app.tar

      # Upload TAR Artifact
      - name: Upload TAR
        uses: actions/upload-artifact@v4
        with:
          name: app-image
          path: app.tar