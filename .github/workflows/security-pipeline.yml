name: Secure CI/CD Pipeline

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main

jobs:
  security-scan-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .

      - name: Run NPM Audit
        run: npm audit --audit-level=high

      - name: Build Docker Image
        run: |
          docker build -t secure-nodejs-app:${{ github.run_number }} .

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secure-nodejs-app:${{ github.run_number }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Save Docker Image
        run: |
          docker save secure-nodejs-app:${{ github.run_number }} -o app.tar
          chmod 644 app.tar

      - name: Verify TAR File
        run: |
          pwd
          ls -lah
          stat app.tar

      - name: Copy TAR to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "app.tar"
          target: "/home/azureuser/"

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            docker load -i /home/azureuser/app.tar

            IMAGE_ID=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "secure-nodejs-app" | head -n 1)

            docker tag $IMAGE_ID localhost:5000/secure-nodejs-app:${{ github.run_number }}

            docker push localhost:5000/secure-nodejs-app:${{ github.run_number }}

            docker stop secure-nodejs-app || true
            docker rm secure-nodejs-app || true

            docker run -d \
              --name secure-nodejs-app \
              -p 3000:3000 \
              localhost:5000/secure-nodejs-app:${{ github.run_number }}

            docker ps